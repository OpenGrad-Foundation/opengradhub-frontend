name: Frontend CI

on:
  push:
    branches: ['feature/**', 'dev', 'staging', 'main']
  pull_request:
    branches: [dev, staging, main]

jobs:
  lint-typecheck-unit:
    name: Lint / Typecheck / Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + component tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_AUTH_PROVIDER: clerk
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
          # Sentry will gracefully skip upload when auth token is missing
          SENTRY_AUTH_TOKEN: ''

  e2e:
    name: Playwright E2E (critical journeys)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run E2E on PRs to staging or main; keep it non-blocking during ramp-up.
    if: >
      github.event_name == 'pull_request' &&
      (github.base_ref == 'staging' || github.base_ref == 'main')
    continue-on-error: true

    env:
      NEXT_PUBLIC_AUTH_PROVIDER: clerk
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.STAGING_API_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY_TEST }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
      PLAYWRIGHT_BASE_URL: ${{ vars.STAGING_FRONTEND_URL }}
      E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
      E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
      E2E_PM_EMAIL: ${{ secrets.E2E_PM_EMAIL }}
      E2E_PM_PASSWORD: ${{ secrets.E2E_PM_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
